receivers:
  otlp:
    protocols:
      http:
      grpc:

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  logging:
    loglevel: debug
  # In a full deployment, you can add an OTLP exporter to send to a central collector
  # otlp:
  #   endpoint: "http://collector:4317"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
