name: Deploy to Staging

on:
  push:
    branches: [ main ]
  pull_request:
    types: [closed]
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging..."
          # Add your staging deployment commands here
          # Example: kubectl apply -f k8s/staging/
          echo "Staging deployment complete"

      - name: Health check
        run: |
          echo "Checking staging health..."
          sleep 10
          curl -f https://staging.ecosyntech.com/health || exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed. Sending notification..."
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ *Staging Deploy Failed*%0A{{ github.run_url }}" \
            -d "parse_mode=Markdown"

  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    
    steps:
      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # Add smoke tests here
          curl -f https://staging.ecosyntech.com/health
          curl -f https://staging.ecosyntech.com/readiness
          curl -f https://staging.ecosyntech.com/api/version
          echo "Smoke tests passed!"
