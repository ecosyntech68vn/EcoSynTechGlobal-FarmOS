version: '3.8'

services:
  # EcoSynTech IoT Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecosyntech-api
    image: ecosyntech/iot-backend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/ecosyntech.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=1h
      - REFRESH_EXPIRES_IN=7d
      - HMAC_SECRET=${HMAC_SECRET}
      - API_KEY=${API_KEY}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-}
      - BASE_URL=${BASE_URL:-https://ecosyntech.com}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LOG_LEVEL=info
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ecosyntech-net
    depends_on:
      - mosquitto

  # Eclipse Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ecosyntech-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8884:8884"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - ecosyntech-net

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: ecosyntech-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - ecosyntech-net

networks:
  ecosyntech-net:
    driver: bridge

volumes:
  data:
  logs:
  mosquitto-data:
  mosquitto-log:
