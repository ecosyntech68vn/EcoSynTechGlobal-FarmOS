version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecosyntech-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - OTEL_COLLECTOR_HOST=otelcol
      - OTEL_ENABLED=true
      - OTEL_SAMPLER_RATIO=0.2
      - OTEL_SERVICE_NAME=ecosyntech-iot-backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ecosyntech

  nginx:
    image: nginx:alpine
    container_name: ecosyntech-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - ecosyntech

  otelcol:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otelcol
    ports:
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    command: ["--config", "/etc/otel-collector-config.yaml"]


networks:
  ecosyntech:
    driver: bridge
