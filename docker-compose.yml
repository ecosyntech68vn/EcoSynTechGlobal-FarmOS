version: '3.8'

services:
  api:
    build: .
    container_name: ecosyntech-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/ecosyntech.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - RATE_LIMIT_MAX_REQUESTS=100
    volumes:
      - ecosyntech-data:/app/data
      - ecosyntech-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ecosyntech-network

  frontend:
    image: nginx:alpine
    container_name: ecosyntech-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./products.json:/usr/share/nginx/html/products.json:ro
      - ./manifest.json:/usr/share/nginx/html/manifest.json:ro
      - ./sw.js:/usr/share/nginx/html/sw.js:ro
      - ./icons:/usr/share/nginx/html/icons:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - ecosyntech-network

volumes:
  ecosyntech-data:
    driver: local
  ecosyntech-logs:
    driver: local

networks:
  ecosyntech-network:
    driver: bridge
