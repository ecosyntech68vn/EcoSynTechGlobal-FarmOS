# EcoSynTech Default Configuration
# Copy to .env and customize for production

# Server
PORT=3000
NODE_ENV=development
LOG_LEVEL=info

# Database
DB_TYPE=sqlite
DB_PATH=./data/ecosyntech.db

# IMPORTANT: Security - CHANGE THESE IN PRODUCTION!
JWT_SECRET=
JWT_EXPIRES_IN=7d

HMAC_SECRET=
WEBHOOK_SECRET=

# MQTT (optional)
MQTT_BROKER_URL=
MQTT_USERNAME=
MQTT_PASSWORD=

# PostgreSQL (optional)
# PG_HOST=
# PG_PORT=5432
# PG_DATABASE=ecosyntech
# PG_USER=postgres
# PG_PASSWORD=

# Backup
BACKUP_DIR=./backups
BACKUP_RETENTION_DAYS=30

# Weather
FARM_LAT=10.7769
FARM_LON=106.7009

# Security
API_KEY=
SERVER_URL=http://localhost:3000
BASE_URL=https://ecosyntech.com

# Blockchain (optional)
BLOCKCHAIN_ENABLED=false
APTOS_NETWORK=testnet
APTOS_MODULE_ADDRESS=0x1

# AI
AI_ENGINE_ENABLED=true
AI_CONFIDENCE_THRESHOLD=0.6

# Health Report
HEALTH_REPORT_INTERVAL_MIN=30
HEALTH_REPORT_QUEUE_THRESHOLD=5

# Water Optimization
WATER_OPTIMIZATION_ENABLED=false
WATER_MIN_MOISTURE=30
WATER_MAX_MOISTURE=70
WATER_CHECK_INTERVAL=300000

# QR Code
QR_CODE_ENABLED=true
QR_CODE_BASE_URL=https://ecosyntech.com

# CORS
CORS_ORIGIN=*

# Rate Limiting
RATE_LIMIT_WINDOW_MS=900000
RATE_LIMIT_MAX_REQUESTS=100