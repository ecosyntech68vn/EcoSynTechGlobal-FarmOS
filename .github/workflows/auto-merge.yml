name: Auto Merge PRs

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Auto Merge
        uses: peter-evans/enable-pull-request-automerge@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          merge_method: merge
