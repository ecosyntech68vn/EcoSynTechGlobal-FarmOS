name: CI

on:
  push:
    branches: [ main, '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      HMAC_SECRET: test-hmac-secret-for-ci
      JWT_SECRET: test-jwt-secret-for-ci
      WEBHOOK_SECRET: test-webhook-secret-for-ci
      DB_PATH: ./data/ecosyntech.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Import Grafana Dashboard (optional)
        if: ${{ env.GF_API_URL != '' && env.GF_API_TOKEN != '' }}
        run: npm run grafana-import
